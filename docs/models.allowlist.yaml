# Frontier-model allowlist
#
# Agentic ALZ permits LLM calls ONLY against the models listed below. Any
# code that constructs an LLM client must call
# `agentic_alz.llm.models.assert_frontier(model)` before issuing a call;
# unlisted models raise `ModelNotAllowed` and the run halts.
#
# Definition of "frontier" for v1: a model that is (a) released by a
# top-tier lab (Anthropic, OpenAI, Google DeepMind), (b) the current or
# immediately-preceding generation of that lab's flagship reasoning family,
# and (c) reachable through a provider with an enterprise data-handling
# agreement that prohibits training on inputs.
#
# Smaller / older models (Haiku 3, GPT-3.5, Gemini Flash, Mistral 7B, etc.)
# are intentionally absent. If a stage seems to "want" a cheaper model,
# the right move is to shrink the prompt or restructure the stage, not to
# downgrade the model.
#
# Updating this file requires a PR with:
#   1. Justification (why the model qualifies as frontier in 2026 terms).
#   2. Evidence of the lab's no-training-on-inputs commitment for the
#      provider being used.
#   3. Eval-harness golden run pass-rate at >= the prior model's rate.
#
# Reviewed by: @platform-team @netsec-team

schema_version: "1"
last_reviewed: "2026-05-08"

models:
