name: regen-docs

# Safety-net backstop for docs/generated/ freshness.
#
# Runs gen_docs.py --check on every push to main (not path-filtered).
# When drift is detected the workflow:
#   1. Regenerates docs/generated/ in-place.
#   2. Pushes to a new branch (regen-docs/<timestamp>).
#   3. Opens a bot-authored PR with the label docs:regen.
#
# This workflow NEVER auto-merges — the PR requires human review.
# It is a companion to (not a replacement for) the path-filtered
# docs / generate-and-check gate on pull_request events, which blocks
# PR merges. This safety net catches admin-override / force-merge scenarios
# where the blocking gate was bypassed.
#
# Kill switch: AGENTIC_ALZ_DISABLED=true short-circuits the workflow.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: regen-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  killswitch:
    name: kill-switch check
    runs-on: ubuntu-latest
    steps:
      - name: Refuse to run if killed
        env:
          AGENTIC_ALZ_DISABLED: ${{ vars.AGENTIC_ALZ_DISABLED }}
        run: |
          if [ "${AGENTIC_ALZ_DISABLED:-false}" = "true" ]; then
            echo "::warning::kill switch engaged; halting regen-docs"
            exit 1
          fi

  check-and-regen:
    name: check and regen
    needs: killswitch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: orchestrator/pyproject.toml
      - name: Install orchestrator (provides agentic-alz CLI for cli.md)
        working-directory: orchestrator
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Check for docs drift
        id: check
        run: |
          if python scripts/gen_docs.py --check; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Regenerate docs
        if: steps.check.outputs.stale == 'true'
        run: python scripts/gen_docs.py
      - name: Ensure docs:regen label exists
        if: steps.check.outputs.stale == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "docs:regen" \
            --description "Auto-regen PR for docs/generated/ drift" \
            --color "0075ca" \
            --repo "$GITHUB_REPOSITORY" \
            || true
      - name: Skip if a regen PR is already open
        if: steps.check.outputs.stale == 'true'
        id: skip-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list \
            --label "docs:regen" \
            --state open \
            --json number \
            --jq length)
          if [ "$existing" -gt 0 ]; then
            echo "::notice::An open docs:regen PR already exists; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Open regen PR
        if: steps.check.outputs.stale == 'true' && steps.skip-check.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="regen-docs/$(date -u +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add docs/generated/
          git commit -m "chore: regenerate docs/generated/ [skip ci]"
          git push origin "$branch"
          pr_body=$(printf '%s\n' \
            'Auto-generated by the `regen-docs` workflow.' \
            '' \
            'Drift was detected on `main` after the most recent push: source-of-truth files changed but `docs/generated/` was not regenerated — this typically indicates an admin override or force-merge that bypassed the `docs / generate-and-check` gate.' \
            '' \
            '**This PR must not be auto-merged.** It requires the same human review as any other docs change. Verify the regenerated output reflects the intended source-of-truth changes, then merge normally.')
          gh pr create \
            --title "chore: regenerate docs/generated/ (drift detected on main)" \
            --body "$pr_body" \
            --label "docs:regen" \
            --head "$branch" \
            --base main
